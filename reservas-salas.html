<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título de tu página | Biblioteca Digital</title>
    
    <link rel="stylesheet" href="css/global.css">
    
    <link rel="stylesheet" href="css/estilos-nuevos.css">
</head>
<body>

    <!-- <header> global.js </header>-->

    <main class="container">
        <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Reserva de Salas de Estudio</h2>
        
        <div class="form-container">
            <div class="form-group">
                <label for="salaSelect">Seleccione la Sala:</label>
                <select id="salaSelect" onchange="verificarDisponibilidad()">
                    <option value="" disabled selected>Elija una opción...</option>
                    <option value="0">Sala A (Grupal - Piso 1)</option>
                    <option value="1">Sala B (Grupal - Piso 2)</option>
                    <option value="2">Cubículo C (Individual)</option>
                </select>
            </div>

            <div class="form-group">
                <p>Estado actual: <span id="estadoSala" class="status-badge status-disponible">Seleccione una sala</span></p>
            </div>

            <div class="form-group">
                <label for="fechaReserva">Fecha de Reserva:</label>
                <input type="date" id="fechaReserva">
            </div>

            <button class="btn" onclick="abrirModal()">Solicitar Reserva</button>
        </div>
    </main>

    <div id="miModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Confirmar Reserva</h3>
            <p id="textoModal">¿Está seguro que desea reservar esta sala?</p>
            <div class="modal-botones">
                <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
                <button class="btn" onclick="confirmarReserva()">Aceptar</button>
            </div>
        </div>
    </div>

    <script src="js/reserva.js" type="text/javascript"></script>

    <footer>
        <iframe height="280" class="site-footer-frame" src="footer.html" frameborder="0" scrolling="no"></iframe>
    </footer>

    <script src="js/global.js"></script>
</body>
</html>

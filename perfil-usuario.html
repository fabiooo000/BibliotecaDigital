<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Biblioteca Digital | Mi Perfil</title>
        <link rel="stylesheet" href="css/global.css">
    </head>
    <body>
        <!-- <header> global.js </header>-->

        <main class="container" style="padding: 2rem 1rem;">
            <div class="profile-grid">
                <aside class="profile-sidebar">
                    <div class="card" style="text-align: center;">
                        <img src="images/user_profile_picture.jpeg" alt="Avatar" style="width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 1rem; border: 3px solid greenyellow;">
                        <h3 id="usernameDisplay">Fabrisio Mariátegui</h3>
                        <p style="color: var(--secondary); font-weight: bold;">Miembro - PREMIUM</p>
                        <p style="font-size: 0.9rem; color: #666;" id="emailDisplay">fabrisio@utpino.edu.pe</p>
                        <p style="font-size: 0.85rem; color: #888; margin-top: 0.5rem;" id="descDisplay">Amante de la ciencia ficción y la historia.<br></p>

                        <div class="social-buttons" style="justify-content: center;">
                            <a href="http://www.facebook.com" target="_blank">Facebook</a>
                            <a href="http://www.instagram.com" target="_blank">Instagram</a>
                            <a href="http://www.linkedin.com" target="_blank">LinkedIn</a>
                            <a href="http://www.tiktok.com" target="_blank">TikTok</a>
                        </div>

                        <button class="btn-cta" style="width: 100%; margin-top: 1rem;" onclick="abrirModalEditar()">Editar Datos</button>
                        <a href="perfil-configuracion.html" class="btn-secondary" style="width: 100%; margin-top: 0.5rem; display: block; text-align: center;">Ir a Configuración ⚙️</a>
                        <button class="btn-danger" style="width: 100%; margin-top: 0.5rem;" onclick="cerrarCuenta()">Cerrar Cuenta</button>
                    </div>
                </aside>

                <section>
                    <div class="activity-list">
                        <h3 style="color: var(--primary); margin-bottom: 1rem;">Leyendo Actualmente (Historial)</h3>
                        <div id="listaLecturaActual">
                            <!-- generado por js -->
                        </div>
                    </div>

                    <div class="activity-list" style="margin-top: 1.5rem;">
                        <h3 style="color: var(--primary); margin-bottom: 1rem;">Actividad Reciente</h3>
                        <div id="listaActividadReciente">
                            <!-- generado por js -->
                        </div>
                    </div>
                </section>
            </div>

            <div class="modal-overlay" id="modalEditar">
                <div class="modal-content">
                    <button class="modal-close" onclick="cerrarModal()">&times;</button>
                    <h3>Editar Datos Personales</h3>
                    <form class="modal-form" onsubmit="event.preventDefault(); guardarDatos();">
                        <label>Nombre Completo:</label>
                        <input type="text" id="inputNombre" required>
                        <label>Correo Electrónico:</label>
                        <input type="email" id="inputCorreo" required>
                        <label>Edad:</label>
                        <input type="number" id="inputEdad" min="10" max="99" required>
                        <label>Descripción / Bio:</label>
                        <textarea id="inputDesc" rows="3" required></textarea>
                        <button type="submit" class="btn-cta" style="width: 100%;">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </main>

        <footer><iframe height="280" class="site-footer-frame" src="footer.html" frameborder="0" scrolling="no"></iframe></footer>
        <script src="js/perfil.js"></script>

    <script src="js/global.js"></script>
    </body>
</html>

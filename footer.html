<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Footer</title>
        <link rel="stylesheet" href="css/global.css">
        <style>
            body {
                margin: 0;
                background: var(--dark);
                color: #fff;
                font-family: inherit;
            }
            .footer-wrap {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 2rem;
                padding: 2rem 1rem;
                text-align: center;
            }
            .footer-section h4 {
                margin-bottom: 0.5rem;
            }
            .footer-section p, .footer-section a {
                margin: 0.3rem 0;
                display: block;
                color: var(--secondary);
            }
            .copyright {
                text-align: center;
                padding: 1rem 0;
                border-top: 1px solid #444;
                font-size: 0.9rem;
                width: 100%;
            }
        </style>
    </head>
    <body>
        <div class="footer-wrap container">
            <div class="footer-section">
                <h4>Biblioteca Digital</h4>
                <p>📧 info@bibliotecadigital.com</p>
                <p>📞 +51 979 979 979</p>
                <p>📍 Av. Parra, Arequipa</p>
            </div>
            <div class="footer-section">
                <h4>Síguenos</h4>
                <a href="https://facebook.com" target="_blank" rel="noopener">Facebook</a>
                <a href="https://twitter.com" target="_blank" rel="noopener">Twitter</a>
                <a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a>
            </div>
        </div>
        <div class="copyright">&copy; 2026 Biblioteca Digital. Todos los derechos reservados.</div>
        <br> 
    </body>
</html>
